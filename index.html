<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemesanan Buket - @bloom_bymega</title>
    <link rel="icon" href="1.jpg" type="image/jpeg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            /* ── BACKGROUND GAMBAR LOKAL ── */
            background-image: url('5.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* Overlay lapisan warna lembut agar teks tetap terbaca walau background ramai */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.3) 100%);
            backdrop-filter: blur(2px);
            z-index: 0;
        }

        /* ── ANIMASI MUNCUL HALUS ALA APPLE ── */
        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ── CONTAINER UTAMA (EFEK KACA 3D PREMIUM) ── */
        .iphone-glass-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.35); 
            backdrop-filter: blur(35px) saturate(200%); 
            -webkit-backdrop-filter: blur(35px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.8); 
            border-radius: 40px;
            padding: 45px 30px;
            width: 100%;
            max-width: 500px;
            /* Shadow Berlapis: Luar + Pantulan Cahaya Dalam */
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.1),
                0 4px 15px rgba(0, 0, 0, 0.05),
                inset 0 2px 3px rgba(255, 255, 255, 0.9),
                inset 0 -2px 5px rgba(255, 255, 255, 0.3);
            
            /* Menjalankan Animasi */
            animation: fadeSlideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* ── SLOT LOGO ── */
        .logo-wrapper {
            text-align: center;
            margin-bottom: 20px;
            animation: fadeSlideUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .logo-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            background-color: rgba(255, 255, 255, 0.9);
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05) rotate(5deg);
        }

        .brand-title {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeSlideUp 1.1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .brand-title h1 {
            font-family: 'Playfair Display', serif;
            font-size: 30px;
            font-weight: 700;
            background: linear-gradient(135deg, #2c2c2e 0%, #ff758c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .brand-title p {
            font-size: 14px;
            line-height: 1.6;
            color: #3a3a3c;
            font-weight: 500;
        }

        .section-tag {
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ff758c;
            margin: 25px 0 16px 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-group {
            margin-bottom: 18px;
            animation: fadeSlideUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        label {
            display: block;
            font-size: 13.5px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1c1c1e;
            margin-left: 6px;
        }

        /* ── INPUT NESTED GLASS (Kaca Di Dalam Kaca) ── */
        input, select, textarea {
            width: 100%;
            padding: 15px 18px;
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            font-size: 15px;
            color: #1c1c1e;
            font-weight: 500;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-appearance: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
        }

        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ff758c' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 18px center;
            background-size: 15px;
            padding-right: 45px;
            cursor: pointer;
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        /* EFEK FOKUS NYALA (Glow) */
        input:focus, select:focus, textarea:focus {
            background: rgba(255, 255, 255, 0.95);
            border-color: #ff7eb3;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 126, 179, 0.15),
                        inset 0 2px 5px rgba(0,0,0,0.01);
        }

        ::placeholder {
            color: #8e8e93;
            opacity: 0.9;
            font-weight: 400;
        }

        /* ── ANIMASI BACKGROUND TOMBOL BERGERAK ── */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ── TOMBOL SUBMIT "WAH" ── */
        .btn-ios {
            width: 100%;
            padding: 18px;
            background: linear-gradient(270deg, #ff758c, #ff7eb3, #ff758c);
            background-size: 200% 200%;
            animation: gradientMove 3s ease infinite; /* Background gradasi yang mengalir */
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(255, 117, 140, 0.4);
            position: relative;
            overflow: hidden;
        }

        /* Kilauan Cahaya saat Tombol di Hover */
        .btn-ios::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            transition: all 0.5s ease;
        }

        .btn-ios:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 15px 35px rgba(255, 117, 140, 0.6);
        }

        .btn-ios:hover::after {
            left: 200%;
        }

        .btn-ios:active {
            transform: translateY(1px);
        }

        /* ── BANNER NOTA BAWAH FLOATING ── */
        .glass-note {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-left: 5px solid #ff758c;
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 13.5px;
            line-height: 1.6;
            color: #2c2c2e;
            font-weight: 500;
            border-right: 1px solid rgba(255,255,255,0.8);
            border-bottom: 1px solid rgba(255,255,255,0.8);
            border-top: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            animation: fadeSlideUp 1.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .glass-note strong {
            color: #ff758c;
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .glass-note ul {
            list-style-type: none;
        }

        .glass-note ul li {
            margin-bottom: 4px;
            position: relative;
            padding-left: 15px;
        }

        .glass-note ul li::before {
            content: "✨";
            position: absolute;
            left: 0;
            top: 0;
            font-size: 10px;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <div class="iphone-glass-card">
        
        <div class="logo-wrapper">
            <img src="1.jpg" alt="Logo @bloom_bymega" class="logo-img">
        </div>

        <div class="brand-title">
            <h1>@bloom_bymega</h1>
            <p>Halo kak, terima kasih sudah tertarik order buket di @bloom_bymega 💌<br>Silakan isi format pemesanan di bawah ini yaa:</p>
        </div>

        <form id="orderForm">
            <div class="section-tag">📌 DATA PEMESANAN</div>

            <div class="form-group">
                <label>Nama</label>
                <input type="text" id="nama" placeholder="Nama lengkap" required>
            </div>

            <div class="form-group">
                <label>No. WhatsApp</label>
                <input type="tel" id="nowa" placeholder="081..." required>
            </div>

            <div class="form-group">
                <label>Tanggal Pemakaian / Pengambilan</label>
                <input type="date" id="tanggal" required>
            </div>

            <div class="form-group">
                <label>Jenis Buket</label>
                <input type="text" id="jenis" placeholder="Bunga asli / Bunga Satin / Artificial / Uang / Snack" required>
            </div>

            <div class="form-group">
                <label>Tema / Warna Buket</label>
                <input type="text" id="tema" placeholder="Warna buket" required>
            </div>

            <div class="form-group">
                <label>Isi Buket (Tangkai/Lembar)</label>
                <input type="text" id="isi" placeholder="Isi tangkai" required>
            </div>

            <div class="form-group">
                <label>Request Ucapan / Kartu</label>
                <select id="ucapan" required>
                    <option value="" disabled selected>Pilih jenis ucapan...</option>
                    <option value="graduation">Graduation</option>
                    <option value="birthday">Birthday</option>
                    <option value="engagement">Engagement</option>
                    <option value="etc">Lainnya (tulis di bawah)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Request Tambahan</label>
                <textarea id="tambahan" placeholder="Isi tambahan lainnya"></textarea>
            </div>

            <div class="form-group">
                <label>Metode Pengambilan</label>
                <select id="pengambilan" required>
                    <option value="" disabled selected>Pilih cara ambil...</option>
                    <option value="ambil langsung">Ambil langsung</option>
                    <option value="COD">COD</option>
                </select>
            </div>

            <div class="form-group">
                <label>Alamat Lengkap</label>
                <textarea id="alamat" placeholder="Alamat rumah atau lokasi janjian COD" required></textarea>
            </div>

            <div class="form-group">
                <label>Metode Pembayaran</label>
                <select id="pembayaran" required>
                    <option value="" disabled selected>Pilih jenis pembayaran...</option>
                    <option value="cash">Cash (Tunai)</option>
                    <option value="tf">Transfer Bank / E-Wallet</option>
                </select>
            </div>

            <button type="submit" class="btn-ios">Kirim Pesanan Sekarang 🌸</button>
        </form>

        <div class="glass-note">
            <strong>Catatan Penting</strong>
            <ul>
                <li>Bisa request custom sesuai budget</li>
                <li>Mohon order H-7 agar hasil lebih maksimal 🤍</li>
            </ul>
        </div>
    </div>

    <script>
        document.getElementById('orderForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const nama = document.getElementById('nama').value;
    const nowa = document.getElementById('nowa').value;
    const tanggal = document.getElementById('tanggal').value;
    const jenis = document.getElementById('jenis').value;
    const tema = document.getElementById('tema').value;
    const isi = document.getElementById('isi').value;
    const ucapan = document.getElementById('ucapan').value;
    const tambahan = document.getElementById('tambahan').value || '-';
    const pengambilan = document.getElementById('pengambilan').value;
    const alamat = document.getElementById('alamat').value;
    const pembayaran = document.getElementById('pembayaran').value;

    // Nomor sudah dimasukkan di sini
    const nomorAdminWhatsApp = '6287861076030'; 

    let textPesan = `🌷 *FORMAT PEMESANAN BUKET* 🌷\n\n`;
    textPesan += `Halo kak, terima kasih sudah tertarik order buket di @bloom_bymega 💌\n`;
    textPesan += `Silakan isi format pemesanan di bawah ini yaa:\n\n`;
    textPesan += `╭───────────────\n`;
    textPesan += `📌 *DATA PEMESANAN*\n`;
    textPesan += `• *Nama* : ${nama}\n`;
    textPesan += `• *No. WhatsApp* : ${nowa}\n`;
    textPesan += `• *Tanggal pemakaian/pengambilan* : ${tanggal}\n`;
    textPesan += `• *Jenis buket* : ${jenis}\n`;
    textPesan += `• *Tema/Warna buket* : ${tema}\n`;
    textPesan += `• *Isi buket (tangkai)* : ${isi}\n`;
    textPesan += `• *Request ucapan/kartu* : ${ucapan}\n`;
    textPesan += `• *Request tambahan* : ${tambahan}\n`;
    textPesan += `• *Metode pengambilan* : ${pengambilan}\n`;
    textPesan += `• *Alamat lengkap* : ${alamat}\n`;
    textPesan += `• *Metode pembayaran* : ${pembayaran}\n`;
    textPesan += `╰───────────────\n\n`;
    textPesan += `✨ *Note:*\n`;
    textPesan += `• Bisa request custom sesuai budget\n`;
    textPesan += `• Mohon order H-7 agar hasil lebih maksimal 🤍\n\n`;
    textPesan += `Terima kasih sudah order di @bloom_bymega 🌸`;

    // Menggunakan wa.me agar lebih stabil dan langsung masuk ke chat
    const urlWhatsApp = `https://wa.me/${nomorAdminWhatsApp}?text=${encodeURIComponent(textPesan)}`;
    window.open(urlWhatsApp, '_blank');
});
    </script>

</body>
</html>
